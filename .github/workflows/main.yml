name: Automatizacion Morningstar ETFs

on:
  schedule:
    # Se ejecuta automáticamente de lunes a viernes a las 23:00 UTC (Ajusta si lo deseas)
    - cron: '0 23 * * 1-5'
  workflow_dispatch: # Te permite forzar la ejecución manual con un solo clic

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar librerías necesarias
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests openpyxl

    - name: Ejecutar Extractor de Morningstar
      run: python descargar_morningstar.py

    - name: Guardar el archivo Excel en GitHub
      run: |
        git config --global user.name 'Morningstar ETF Bot'
        git config --global user.email 'bot@morningstar-scraper.com'
        git add lista_completa_etfs_morningstar.xlsx
        git commit -m "Actualización diaria automática de ETFs Morningstar" || echo "No hay cambios hoy"
        git push
